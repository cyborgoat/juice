<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="juice" x1="180" y1="140" x2="340" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFBE56"/>
      <stop offset=".45" stop-color="#F76A2B"/>
      <stop offset="1" stop-color="#E84393"/>
    </linearGradient>
    <linearGradient id="glass-edge" x1="150" y1="150" x2="370" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".25"/>
      <stop offset=".5" stop-color="white" stop-opacity=".08"/>
      <stop offset="1" stop-color="white" stop-opacity=".2"/>
    </linearGradient>
    <linearGradient id="highlight" x1="175" y1="170" x2="195" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".45"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="straw-g" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FF6B6B"/>
      <stop offset="1" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="mint1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5EE2A0"/>
      <stop offset="1" stop-color="#2DB87A"/>
    </linearGradient>
    <linearGradient id="mint2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#45D48A"/>
      <stop offset="1" stop-color="#1FA068"/>
    </linearGradient>
    <clipPath id="glass-clip">
      <path d="M168 168h184l-24 272c-1 14-13 26-28 26h-80c-15 0-27-12-28-26L168 168Z"/>
    </clipPath>
  </defs>

  <!-- Glass body (juice fill) -->
  <path
    d="M168 168h184l-24 272c-1 14-13 26-28 26h-80c-15 0-27-12-28-26L168 168Z"
    fill="url(#juice)"
  />

  <!-- Glass transparency overlay -->
  <path
    d="M168 168h184l-24 272c-1 14-13 26-28 26h-80c-15 0-27-12-28-26L168 168Z"
    fill="url(#glass-edge)"
  />

  <!-- Left glass reflection streak -->
  <path
    d="M182 178h10l-8 260h-6z"
    fill="url(#highlight)"
    clip-path="url(#glass-clip)"
  />

  <!-- Right subtle reflection -->
  <path
    d="M334 178h5l-6 200h-4z"
    fill="white" fill-opacity=".1"
    clip-path="url(#glass-clip)"
  />

  <!-- Bubbles inside juice -->
  <circle cx="228" cy="300" r="9" fill="white" fill-opacity=".18" clip-path="url(#glass-clip)"/>
  <circle cx="270" cy="380" r="6" fill="white" fill-opacity=".14" clip-path="url(#glass-clip)"/>
  <circle cx="305" cy="320" r="7" fill="white" fill-opacity=".16" clip-path="url(#glass-clip)"/>
  <circle cx="248" cy="415" r="5" fill="white" fill-opacity=".12" clip-path="url(#glass-clip)"/>

  <!-- Glass rim — thin glass edge, not a lid -->
  <path
    d="M164 168h192"
    stroke="white" stroke-opacity=".75" stroke-width="4" stroke-linecap="round"
  />
  <!-- Rim inner highlight -->
  <path
    d="M174 170h172"
    stroke="white" stroke-opacity=".2" stroke-width="2" stroke-linecap="round"
  />

  <!-- Straw — smooth, colored, reaches near bottom of glass -->
  <g transform="rotate(12 308 260)">
    <rect x="304" y="16" width="10" height="400" rx="5" fill="url(#straw-g)"/>
    <!-- White stripe on straw for depth -->
    <rect x="306" y="16" width="3" height="400" rx="1.5" fill="white" fill-opacity=".2"/>
  </g>

  <!-- Mint leaves on rim -->
  <path
    d="M314 152c10-32 30-50 44-56 0 16-8 36-22 48-7 6-14 10-22 10l0-2Z"
    fill="url(#mint1)"
  />
  <path
    d="M308 148c12-34 34-54 48-58-2 18-14 40-28 52-8 6-16 10-22 10l2-4Z"
    fill="url(#mint2)"
  />
  <!-- Leaf vein -->
  <path
    d="M318 150c6-22 20-38 34-48"
    stroke="#2DB87A" stroke-width="1.2" stroke-opacity=".5" fill="none"
  />

  <!-- Bottom glass base reflection -->
  <ellipse cx="268" cy="462" rx="45" ry="3" fill="white" fill-opacity=".06"/>
</svg>
